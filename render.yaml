databases:
  - name: doitnow-db
    plan: free
    databaseName: doitnow
    user: doitnow_user

services:
  - type: web
    name: doitnow-be
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: doitnow-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: JWT_ISSUER
        value: homehelp-api
      - key: JWT_AUDIENCE
        value: homehelp-client
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      - key: GOOGLE_ADMIN_CLIENT_ID
        sync: false
      - key: GOOGLE_ADMIN_WEB_CLIENT_ID
        sync: false
      - key: GOOGLE_ADMIN_ANDROID_CLIENT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
